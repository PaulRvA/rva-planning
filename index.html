<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RvA Weekplanning</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #f0a500;
    --green: #2ea043;
    --red: #da3633;
    --orange: #d29922;
    --text: #e6edf3;
    --muted: #7d8590;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    height: 50px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700;
    letter-spacing: 1px; color: var(--accent); text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  .week-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }
  .clock {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: 2px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .main {
    display: flex; flex-direction: column;
    flex: 1; overflow: hidden; gap: 1px; background: var(--border);
  }

  .panel {
    background: var(--bg); display: flex;
    flex-direction: column; overflow: hidden;
  }
  .panel-planning  { flex: 0 0 58%; }
  .panel-resources { flex: 1; }

  .panel-header {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 7px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  }
  .badge {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 8px;
    font-size: 11px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── PLANNING TABLE ── */
  .planning-scroll { overflow: auto; flex: 1; }
  .planning-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
  .planning-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .planning-table { width: 100%; border-collapse: collapse; }

  .planning-table thead th {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 7px 10px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    position: sticky; top: 0; z-index: 2; white-space: nowrap;
  }
  .planning-table thead th.today-col {
    color: var(--accent); border-bottom: 2px solid var(--accent); background: #1a1600;
  }
  .planning-table thead th:first-child {
    text-align: left; position: sticky; left: 0; z-index: 3;
    min-width: 160px; background: var(--surface2);
  }

  .planning-table tbody tr { border-bottom: 1px solid #1a1f27; }
  .planning-table tbody tr:hover td { background: #13181f !important; }

  .planning-table tbody td {
    padding: 4px 6px; border-right: 1px solid #1a1f27;
    text-align: left; vertical-align: top;
  }
  .planning-table tbody td:first-child {
    position: sticky; left: 0; background: var(--bg); z-index: 1;
    font-weight: 600; font-size: 12px;
    border-right: 1px solid var(--border);
    white-space: nowrap; padding: 6px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .5px;
  }
  .planning-table tbody td.today-col { background: #0d1100; }

  /* Projecten chips in cel */
  .proj-cell { display: flex; flex-direction: column; gap: 2px; padding: 3px 0; }
  .proj-chip {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 140px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ── RESOURCES TABLE ── */
  .resources-scroll { overflow-y: auto; flex: 1; }
  .resources-scroll::-webkit-scrollbar { width: 4px; }
  .resources-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .res-table { width: 100%; border-collapse: collapse; }
  .res-table thead th {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); padding: 6px 12px;
    text-align: left; font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
    position: sticky; top: 0; z-index: 2; white-space: nowrap;
  }
  .res-table tbody tr { border-bottom: 1px solid #1a1f27; }
  .res-table tbody tr:hover td { background: #13181f; }
  .res-table tbody td {
    padding: 5px 12px; border-right: 1px solid #1a1f27;
    font-size: 12px; vertical-align: middle; white-space: nowrap;
  }
  .res-groep-row td {
    background: var(--surface) !important;
    padding: 3px 12px !important;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border) !important;
  }
  .initials {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 10px; color: var(--accent); letter-spacing: .5px;
  }
  .res-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 3px; white-space: nowrap; letter-spacing: .3px;
  }
  .status-rva      { background: #1a3a1a; color: #4caf50; border: 1px solid #2a5a2a; }
  .status-vrij     { background: #1a2a3a; color: #64b5f6; border: 1px solid #1f6feb; }
  .status-nb       { background: #3a1a1a; color: #ef9a9a; border: 1px solid #5a2a2a; }
  .status-comforza { background: #2a2a1a; color: #fff176; border: 1px solid #5a4a1a; }
  .status-volders  { background: #2a1a3a; color: #ce93d8; border: 1px solid #4a2a5a; }
  .status-opleiding{ background: #1a3a3a; color: #80cbc4; border: 1px solid #1a5a5a; }
  .status-taak     { background: #2a1a1a; color: var(--accent); border: 1px solid #5a3a1a; }
  .status-stop     { background: #2a2a2a; color: #aaa; border: 1px solid #444; }
  .status-none     { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 10px; color: var(--muted);
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">RvA <span>Projecten</span></div>
  <div class="week-label" id="weekLabel">Week —</div>
  <div class="status-dot" id="statusDot"></div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="main">
  <!-- BOVEN: PROJECTPLANNING -->
  <div class="panel panel-planning">
    <div class="panel-header">
      <span class="panel-title">Projectplanning</span>
      <span class="badge" id="planBadge">—</span>
    </div>
    <div class="planning-scroll" id="planningPanel">
      <div class="loading"><div class="spinner"></div><span>Laden...</span></div>
    </div>
  </div>

  <!-- ONDER: RESOURCES -->
  <div class="panel panel-resources">
    <div class="panel-header">
      <span class="panel-title">Resources</span>
      <span class="badge" id="resBadge">—</span>
      <span style="font-size:11px;color:var(--muted);margin-left:4px;">— status vandaag</span>
    </div>
    <div class="resources-scroll" id="resourcesPanel">
      <div class="loading"><div class="spinner"></div><span>Laden...</span></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  workerUrl: 'https://rva-planning.paul-8e9.workers.dev',
  refreshInterval: 5 * 60 * 1000,
};

// ── HELPERS ──
function getWeekDays() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({length: 5}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function fmtDate(d) {
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

// Format voor API criteria: YYYY-MM-DD
function fmtDateISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDayLabel(d) {
  return `${'zo ma di wo do vr za'.split(' ')[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function getWeekNumber(d) {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  return Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
}

// Converteer rgb(r,g,b) naar hex en bepaal tekstkleur
function rgbToHex(rgb) {
  if (!rgb) return '#333';
  const m = rgb.match(/\d+/g);
  if (!m) return '#333';
  return '#' + m.map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

function textColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 150 ? '#000' : '#fff';
}

function getStatusClass(loc, taak) {
  if (taak && (typeof taak === 'object' ? taak.display_value : taak)) return 'status-taak';
  if (!loc) return 'status-none';
  const l = loc.toLowerCase();
  if (l.includes('vrij'))             return 'status-vrij';
  if (l.includes('niet beschikbaar')) return 'status-nb';
  if (l.includes('comforza'))         return 'status-comforza';
  if (l.includes('volders'))          return 'status-volders';
  if (l.includes('opleiding'))        return 'status-opleiding';
  if (l.includes('rva'))              return 'status-rva';
  return 'status-stop';
}

function getStatusLabel(loc, taak) {
  if (taak) {
    const t = typeof taak === 'object' ? taak.display_value : taak;
    if (t) return t.substring(0, 18);
  }
  if (!loc) return '—';
  const l = loc.toLowerCase();
  if (l.includes('vrij'))             return 'Vrij';
  if (l.includes('niet beschikbaar')) return 'Niet beschikbaar';
  if (l.includes('comforza'))         return 'Comforza';
  if (l.includes('volders werkpl'))   return 'Volders werkplaats';
  if (l.includes('volders op loc'))   return 'Volders op locatie';
  if (l.includes('volders'))          return 'Volders';
  if (l.includes('opleiding'))        return 'Opleiding';
  if (l.includes('rva'))              return 'RvA';
  return loc.substring(0, 20);
}

// ── KLOK + WEEK ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

const days = getWeekDays();
document.getElementById('weekLabel').textContent =
  `Week ${getWeekNumber(days[0])} — ${fmtDayLabel(days[0])} t/m ${fmtDayLabel(days[4])}`;

// ── API ──
async function apiFetch(endpoint) {
  const res = await fetch(`${CONFIG.workerUrl}/?endpoint=${encodeURIComponent(endpoint)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.code !== 3000) throw new Error(`API ${json.code}: ${json.message||''}`);
  return json.data;
}

// ── RENDER PROJECTPLANNING (BOVEN) ──
function renderPlanning(items) {
  // Definieer de vaste locaties (rijen) in volgorde
  const locatieOrder = [
    'Consignatie',
    'RvA Service',
    'RvA Projecten op locatie',
    'RvA Projecten werkplaats',
    'Volders op locatie',
    'Volders werkplaats',
    'Comforza',
  ];

  // Groepeer items per Locatie + Datum
  // locatie -> datum -> [items]
  const grid = {};
  const foundLocaties = new Set();

  items.forEach(item => {
    const loc = item.Locatie || 'Overig';
    foundLocaties.add(loc);
    if (!grid[loc]) grid[loc] = {};
    if (!grid[loc][item.Datum]) grid[loc][item.Datum] = [];
    grid[loc][item.Datum].push(item);
  });

  // Combineer vaste volgorde + eventuele extra locaties uit data
  const allLocaties = [
    ...locatieOrder.filter(l => foundLocaties.has(l)),
    ...[...foundLocaties].filter(l => !locatieOrder.includes(l)).sort()
  ];

  // Header
  let thead = '<tr><th>Locatie / Afdeling</th>';
  days.forEach(d => {
    const cls = isToday(d) ? ' class="today-col"' : '';
    thead += `<th${cls}>${fmtDayLabel(d)}</th>`;
  });
  thead += '</tr>';

  // Body
  let tbody = '';
  allLocaties.forEach(loc => {
    tbody += '<tr>';
    tbody += `<td>${loc}</td>`;
    days.forEach(d => {
      const ds = fmtDate(d);
      const tdCls = isToday(d) ? ' class="today-col"' : '';
      const projecten = grid[loc]?.[ds] || [];
      if (projecten.length === 0) {
        tbody += `<td${tdCls}></td>`;
      } else {
        const chips = projecten.map(p => {
          const bg = rgbToHex(p.Hexcode);
          const fg = textColor(bg);
          return `<span class="proj-chip" style="background:${bg};color:${fg};border-color:${bg}" title="${p.Omschrijving}">${p.Omschrijving}</span>`;
        }).join('');
        tbody += `<td${tdCls}><div class="proj-cell">${chips}</div></td>`;
      }
    });
    tbody += '</tr>';
  });

  // Voeg ook locaties toe die niet in vaste lijst staan
  document.getElementById('planningPanel').innerHTML =
    `<table class="planning-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  document.getElementById('planBadge').textContent = `${items.length} items`;
}

// ── RENDER RESOURCES (ONDER) met auto-scroll ──
function renderResources(resources, plannings) {
  const active = resources.filter(r => r.Tonen_in_Planning === 'true');
  const today = fmtDate(new Date());

  const todayPlan = {};
  plannings.forEach(p => {
    if (p.Datum === today && !todayPlan[p.Resource.ID]) {
      todayPlan[p.Resource.ID] = p;
    }
  });

  const groupOrder = ['Kantoor','Vast personeel','ZZP','Facilitair','Overig'];
  const groups = {};
  active.forEach(r => {
    const g = r.Groep || 'Overig';
    if (!groups[g]) groups[g] = [];
    groups[g].push(r);
  });

  let tbody = '';
  const renderGroup = g => {
    if (!groups[g]?.length) return;
    tbody += `<tr class="res-groep-row"><td colspan="5">${g}</td></tr>`;
    groups[g].forEach(r => {
      const p = todayPlan[r.ID];
      const cls = getStatusClass(p?.Startlocatie||null, p?.Taaknummers||null);
      const lbl = getStatusLabel(p?.Startlocatie||null, p?.Taaknummers||null);
      const code = r.Resource_code || r.Naam.substring(0,3).toUpperCase();
      tbody += `<tr>
        <td><span class="initials">${code}</span></td>
        <td style="font-weight:500">${r.Naam}</td>
        <td style="color:var(--muted)">${r.Functie_Werknemer||'—'}</td>
        <td style="color:var(--muted)">${r.Groep||'—'}</td>
        <td><span class="res-status ${cls}">${lbl}</span></td>
      </tr>`;
    });
  };

  groupOrder.forEach(renderGroup);
  Object.keys(groups).forEach(g => { if (!groupOrder.includes(g)) renderGroup(g); });

  const thead = `<tr>
    <th style="width:44px"></th><th>Naam</th><th>Functie</th><th>Groep</th><th>Vandaag</th>
  </tr>`;

  document.getElementById('resourcesPanel').innerHTML =
    `<table class="res-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  document.getElementById('resBadge').textContent = `${active.length} personen`;

  startAutoScroll();
}

// ── AUTO SCROLL ──
let scrollInterval = null;
function startAutoScroll() {
  if (scrollInterval) clearInterval(scrollInterval);
  const el = document.getElementById('resourcesPanel');
  if (!el) return;
  scrollInterval = setInterval(() => {
    el.scrollTop += 1;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 2) {
      setTimeout(() => { el.scrollTop = 0; }, 2000);
    }
  }, 40);
}

// ── LOAD ALL ──
async function loadAll() {
  const dot = document.getElementById('statusDot');
  dot.style.background = 'var(--orange)';
  dot.style.boxShadow = '0 0 6px var(--orange)';

  try {
    // Resources
    const resources = await apiFetch('Resources_Report?from=1&limit=200');

    // Plannings voor bieżący tydzień (Resources status)
    let allPlannings = [];
    for (let from = 1; from <= 5000; from += 200) {
      const chunk = await apiFetch(`All_Plannings?from=${from}&limit=200`);
      allPlannings = allPlannings.concat(chunk);
      if (chunk.length < 200) break;
    }
    const weekDates = new Set(days.map(fmtDate));
    weekDates.add(fmtDate(new Date()));
    const weekPlannings = allPlannings.filter(p => weekDates.has(p.Datum));

    // Projectplanning — bieżący tydzień via datum criteria
    const dateFrom = fmtDateISO(days[0]);
    const dateTo   = fmtDateISO(days[4]);
    const criteria = `(Datum >= "${dateFrom}" && Datum <= "${dateTo}")`;
    const ppEndpoint = `Planning_Projectplanning_Report?criteria=${encodeURIComponent(criteria)}&from=1&limit=500`;
    const ppItems = await apiFetch(ppEndpoint);

    renderPlanning(ppItems);
    renderResources(resources, weekPlannings);

    dot.style.background = 'var(--green)';
    dot.style.boxShadow = '0 0 6px var(--green)';
  } catch (err) {
    console.error(err);
    dot.style.background = 'var(--red)';
    dot.style.boxShadow = '0 0 6px var(--red)';
    document.getElementById('planningPanel').innerHTML =
      `<div class="loading" style="color:var(--red)">⚠ Fout: ${err.message}</div>`;
  }
}

loadAll();
setInterval(loadAll, CONFIG.refreshInterval);
</script>
</body>
</html>
