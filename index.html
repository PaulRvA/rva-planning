<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RvA Weekplanning</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #1f6feb;
    --green: #2ea043;
    --red: #da3633;
    --orange: #d29922;
    --text: #e6edf3;
    --muted: #7d8590;
    --header-h: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  .week-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .clock {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 2px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 1px;
    background: var(--border);
  }

  /* ── PANEL ── */
  .panel {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-left { flex: 0 0 340px; }
  .panel-right { flex: 1; }

  .panel-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── RESOURCES PANEL ── */
  .resources-scroll {
    overflow-y: auto;
    flex: 1;
  }
  .resources-scroll::-webkit-scrollbar { width: 4px; }
  .resources-scroll::-webkit-scrollbar-track { background: transparent; }
  .resources-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .group-header {
    padding: 6px 16px 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .resource-row {
    display: flex;
    align-items: center;
    padding: 7px 16px;
    border-bottom: 1px solid #1a1f27;
    gap: 10px;
    transition: background .15s;
  }
  .resource-row:hover { background: var(--surface); }

  .initials {
    width: 30px; height: 30px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
    letter-spacing: .5px;
  }

  .resource-info { flex: 1; min-width: 0; }
  .resource-name {
    font-weight: 500;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .resource-func {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .today-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    letter-spacing: .5px;
    flex-shrink: 0;
  }
  .status-rva      { background: #1a3a1a; color: #4caf50; border: 1px solid #2a5a2a; }
  .status-vrij     { background: #1a2a3a; color: #64b5f6; border: 1px solid #1f6feb; }
  .status-nb       { background: #3a1a1a; color: #ef9a9a; border: 1px solid #5a2a2a; }
  .status-comforza { background: #2a2a1a; color: #fff176; border: 1px solid #5a4a1a; }
  .status-volders  { background: #2a1a3a; color: #ce93d8; border: 1px solid #4a2a5a; }
  .status-opleiding{ background: #1a3a3a; color: #80cbc4; border: 1px solid #1a5a5a; }
  .status-taak     { background: #2a1a1a; color: var(--accent); border: 1px solid #5a3a1a; }
  .status-stop     { background: #2a2a2a; color: #aaa; border: 1px solid #444; }
  .status-none     { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

  /* ── PLANNING PANEL ── */
  .planning-scroll {
    overflow: auto;
    flex: 1;
  }
  .planning-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
  .planning-scroll::-webkit-scrollbar-track { background: transparent; }
  .planning-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .planning-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }

  .planning-table thead th {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 8px 12px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .planning-table thead th.today-col {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
    background: #1a1600;
  }
  .planning-table thead th:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 3;
    min-width: 160px;
  }

  .planning-table tbody tr {
    border-bottom: 1px solid #1a1f27;
  }
  .planning-table tbody tr:hover td { background: #13181f; }

  .planning-table tbody td {
    padding: 6px 10px;
    border-right: 1px solid #1a1f27;
    vertical-align: middle;
    text-align: center;
  }
  .planning-table tbody td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 1;
    font-weight: 500;
    font-size: 12px;
    border-right: 1px solid var(--border);
  }
  .planning-table tbody tr:hover td:first-child { background: #13181f; }

  .planning-table tbody td.today-col {
    background: #0d1100;
  }
  .planning-table tbody tr:hover td.today-col { background: #111500; }

  .cell-chip {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: .3px;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 12px;
    color: var(--muted);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 12px;
    color: var(--red);
    padding: 20px;
    text-align: center;
  }
  .error-msg .cookie-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-top: 8px;
    text-align: left;
    width: 100%;
    max-width: 500px;
  }
  .cookie-box label {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cookie-box textarea {
    width: 100%;
    height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    padding: 8px;
    resize: none;
    font-family: monospace;
  }
  .cookie-box button {
    margin-top: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 6px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }

  .group-row td {
    background: var(--surface) !important;
    padding: 4px 10px 4px !important;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border) !important;
  }
</style>
</head>
<body>

<header>
  <div class="logo">RvA <span>Projecten</span></div>
  <div class="week-label" id="weekLabel">Week —</div>
  <div class="status-dot" id="statusDot" title="Verbonden"></div>
  <div class="clock" id="clock">--:--</div>
</header>

<div class="main">
  <!-- RESOURCES -->
  <div class="panel panel-left">
    <div class="panel-header">
      <span class="panel-title">Resources</span>
      <span class="badge" id="resBadge">—</span>
    </div>
    <div class="resources-scroll" id="resourcesPanel">
      <div class="loading"><div class="spinner"></div><span>Laden...</span></div>
    </div>
  </div>

  <!-- PLANNING -->
  <div class="panel panel-right">
    <div class="panel-header">
      <span class="panel-title">Projectplanning</span>
      <span class="badge" id="planBadge">—</span>
    </div>
    <div class="planning-scroll" id="planningPanel">
      <div class="loading"><div class="spinner"></div><span>Laden...</span></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIGURATIE — pas hier je cookie string aan
// ─────────────────────────────────────────────
const CONFIG = {
  baseUrl: 'https://app.rvaprojecten.nl/api/v2/ictroosendaal/rva-service/report',
  // Plak hier je volledige cookie string (kopieer uit DevTools > Headers > Cookie)
  cookie: '__Secure-iamsdt_client_30025614766=0.EnQSMOWiUGRX_0OKzBqVMGbQhRpa5q3j40XIrCxomZAYIZ_gFDDw4LKZ8J29j70QF7G1KBpAwlOVtcbjyy2oae42pSYifDuayjwWk8ZFdQCDxxz23e9uitnIQmyTz-9T-Wp2924UiokzeBLKNSFK3kCBNclcDyCChtWBqoXjqqUB; _iamadt_client_30025614766=e5a2506457ff438acc1a953066d0851a5ae6ade3e345c8ac2c68999018219fe01430f0e0b299f09dbd8fbd1017b1b528; _iambdt_client_30025614766=c25395b5c6e3cb2da869ee36a526227c3b9aca3c1693c645750083c71cf6ddef6e8ad9c8426c93cfef53f96a76f76e148a89337812ca35214ade408135c95c0f; zalb_754b98fd32=e003042a43da1010e832c2f03c48973a; zccpn=d9d73a1bcc902340ec0e8c0d0ed7d2aeedea0f12bd1a7bdeb174fb189e4a4b6322080eadf60032a822436c9d04a8387a38c59ec4f95e2f6fd35a799de254232b; cli_rgn=NL; zalb_0fb64efc73=26df18345e40aa22b73edaa48f272eba; concsr=d9d73a1bcc902340ec0e8c0d0ed7d2aeedea0f12bd1a7bdeb174fb189e4a4b6322080eadf60032a822436c9d04a8387a38c59ec4f95e2f6fd35a799de254232b; zalb_0350d15cfd=556e2b041aa8497474683ee90d391cbd; iamcsr=e69cd820-4617-4f30-93f8-68eff18306c3; zalb_ad9736e59b=5b8f52e74fa2e07e2f129b57ba70d61e; CT_CSRF_TOKEN=fc9ee0d2-f16e-44f1-810c-f98887c0320f; wms-tkp-token_client_30025614766=30038417044-21f3fb34-9b9b46c9722517546de5087d14e89878; zalb_6de7838b24=1dd2a5c56944645a07aa16213753e187; zalb_a7c5971826=581b4819ce53dc00db9a9ddc0e4a8a79; JSESSIONID=A8DEE7FAEDE47DF013782B78BBF3F59C',
  // Hoe vaak data opnieuw laden (milliseconden) — standaard 5 minuten
  refreshInterval: 5 * 60 * 1000,
};

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function getWeekDays() {
  const now = new Date();
  const day = now.getDay(); // 0=zo
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));

  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function fmtDate(d) {
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}-${mm}-${d.getFullYear()}`;
}

function fmtDayLabel(d) {
  const names = ['zo','ma','di','wo','do','vr','za'];
  return `${names[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function getWeekNumber(d) {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const diff = d - jan4;
  return Math.ceil((diff / 86400000 + jan4.getDay() + 1) / 7);
}

function statusChip(loc, taak) {
  if (taak) {
    const label = typeof taak === 'object' ? taak.display_value : taak;
    return `<span class="cell-chip status-taak" title="${label}">${label.substring(0,18)}</span>`;
  }
  if (!loc || loc === '') return `<span class="cell-chip status-none">—</span>`;
  const l = loc.toLowerCase();
  if (l.includes('vrij'))            return `<span class="cell-chip status-vrij">Vrij</span>`;
  if (l.includes('niet beschikbaar'))return `<span class="cell-chip status-nb">Niet besch.</span>`;
  if (l.includes('comforza'))        return `<span class="cell-chip status-comforza">Comforza</span>`;
  if (l.includes('volders werkpl'))  return `<span class="cell-chip status-volders">V. werkplaats</span>`;
  if (l.includes('volders op loc'))  return `<span class="cell-chip status-volders">V. locatie</span>`;
  if (l.includes('volders'))         return `<span class="cell-chip status-volders">Volders</span>`;
  if (l.includes('opleiding'))       return `<span class="cell-chip status-opleiding">Opleiding</span>`;
  if (l.includes('rva'))             return `<span class="cell-chip status-rva">RvA</span>`;
  if (l.includes('stop'))            return `<span class="cell-chip status-stop" title="${loc}">${loc.substring(0,14)}</span>`;
  return `<span class="cell-chip status-none" title="${loc}">${loc.substring(0,14)}</span>`;
}

function todayStatusClass(loc, taak) {
  if (taak) return 'status-taak';
  if (!loc) return 'status-none';
  const l = loc.toLowerCase();
  if (l.includes('vrij'))            return 'status-vrij';
  if (l.includes('niet beschikbaar'))return 'status-nb';
  if (l.includes('comforza'))        return 'status-comforza';
  if (l.includes('volders'))         return 'status-volders';
  if (l.includes('opleiding'))       return 'status-opleiding';
  if (l.includes('rva'))             return 'status-rva';
  return 'status-stop';
}

function todayStatusLabel(loc, taak) {
  if (taak) {
    const label = typeof taak === 'object' ? taak.display_value : taak;
    return label.substring(0, 16);
  }
  if (!loc) return '—';
  const l = loc.toLowerCase();
  if (l.includes('vrij'))            return 'Vrij';
  if (l.includes('niet beschikbaar'))return 'Niet besch.';
  if (l.includes('comforza'))        return 'Comforza';
  if (l.includes('volders werkpl'))  return 'V. werkplaats';
  if (l.includes('volders op loc'))  return 'V. locatie';
  if (l.includes('volders'))         return 'Volders';
  if (l.includes('opleiding'))       return 'Opleiding';
  if (l.includes('rva'))             return 'RvA';
  return loc.substring(0,14);
}

// ─────────────────────────────────────────────
// KLOK
// ─────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
setInterval(updateClock, 1000);
updateClock();

// ─────────────────────────────────────────────
// WEEK LABEL
// ─────────────────────────────────────────────
const days = getWeekDays();
const wn = getWeekNumber(days[0]);
document.getElementById('weekLabel').textContent = `Week ${wn} — ${fmtDayLabel(days[0])} t/m ${fmtDayLabel(days[4])}`;

// ─────────────────────────────────────────────
// API FETCH
// ─────────────────────────────────────────────
async function apiFetch(endpoint) {
  const headers = { 'Accept': '*/*', 'Agent-Type': 'ZohoWidgets' };
  if (CONFIG.cookie) headers['Cookie'] = CONFIG.cookie;

  const res = await fetch(`${CONFIG.baseUrl}/${endpoint}`, {
    credentials: 'include',
    headers
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.code !== 3000) throw new Error(`API code ${json.code}: ${json.message||''}`);
  return json.data;
}

// ─────────────────────────────────────────────
// RENDER RESOURCES
// ─────────────────────────────────────────────
function renderResources(resources, plannings) {
  const today = fmtDate(new Date());
  // Index: resourceID -> today's planning
  const todayPlan = {};
  plannings.forEach(p => {
    if (p.Datum === today) {
      const id = p.Resource.ID;
      if (!todayPlan[id]) todayPlan[id] = p;
    }
  });

  // Group resources
  const groups = {};
  resources.forEach(r => {
    const g = r.Groep || 'Overig';
    if (!groups[g]) groups[g] = [];
    groups[g].push(r);
  });

  const groupOrder = ['Kantoor','Vast personeel','ZZP','Facilitair','Overig'];

  let html = '';
  groupOrder.forEach(g => {
    if (!groups[g] || groups[g].length === 0) return;
    html += `<div class="group-header">${g}</div>`;
    groups[g].forEach(r => {
      const plan = todayPlan[r.ID];
      const loc = plan ? plan.Startlocatie : null;
      const taak = plan ? plan.Taaknummers : null;
      const cls = todayStatusClass(loc, taak);
      const lbl = todayStatusLabel(loc, taak);
      const code = r.Resource_code || r.Naam.substring(0,3).toUpperCase();
      html += `
        <div class="resource-row">
          <div class="initials">${code}</div>
          <div class="resource-info">
            <div class="resource-name">${r.Naam}</div>
            <div class="resource-func">${r.Functie_Werknemer||'—'}</div>
          </div>
          <span class="today-status ${cls}">${lbl}</span>
        </div>`;
    });
  });

  // remaining groups not in order
  Object.keys(groups).forEach(g => {
    if (groupOrder.includes(g)) return;
    html += `<div class="group-header">${g}</div>`;
    groups[g].forEach(r => {
      const plan = todayPlan[r.ID];
      const loc = plan ? plan.Startlocatie : null;
      const taak = plan ? plan.Taaknummers : null;
      const cls = todayStatusClass(loc, taak);
      const lbl = todayStatusLabel(loc, taak);
      const code = r.Resource_code || r.Naam.substring(0,3).toUpperCase();
      html += `
        <div class="resource-row">
          <div class="initials">${code}</div>
          <div class="resource-info">
            <div class="resource-name">${r.Naam}</div>
            <div class="resource-func">${r.Functie_Werknemer||'—'}</div>
          </div>
          <span class="today-status ${cls}">${lbl}</span>
        </div>`;
    });
  });

  document.getElementById('resourcesPanel').innerHTML = html;
  document.getElementById('resBadge').textContent = resources.length;
}

// ─────────────────────────────────────────────
// RENDER PLANNING TABLE
// ─────────────────────────────────────────────
function renderPlanning(resources, plannings) {
  // Build lookup: resourceID -> day -> planning
  const byRes = {};
  plannings.forEach(p => {
    const id = p.Resource.ID;
    if (!byRes[id]) byRes[id] = {};
    const d = p.Datum;
    if (!byRes[id][d]) byRes[id][d] = p;
  });

  // Only resources that have at least one planning in this week
  const weekDates = days.map(fmtDate);
  const activeRes = resources.filter(r =>
    weekDates.some(d => byRes[r.ID] && byRes[r.ID][d])
  );

  // Group
  const groups = {};
  activeRes.forEach(r => {
    const g = r.Groep || 'Overig';
    if (!groups[g]) groups[g] = [];
    groups[g].push(r);
  });

  const groupOrder = ['Kantoor','Vast personeel','ZZP','Facilitair','Overig'];

  let thead = '<tr><th>Naam</th>';
  days.forEach(d => {
    const cls = isToday(d) ? ' class="today-col"' : '';
    thead += `<th${cls}>${fmtDayLabel(d)}</th>`;
  });
  thead += '</tr>';

  let tbody = '';

  const renderGroup = (g) => {
    if (!groups[g] || groups[g].length === 0) return;
    tbody += `<tr class="group-row"><td colspan="${days.length+1}">${g}</td></tr>`;
    groups[g].forEach(r => {
      tbody += '<tr>';
      tbody += `<td>${r.Naam}</td>`;
      days.forEach(d => {
        const dateStr = fmtDate(d);
        const plan = byRes[r.ID] && byRes[r.ID][dateStr];
        const tdCls = isToday(d) ? ' class="today-col"' : '';
        if (plan) {
          tbody += `<td${tdCls}>${statusChip(plan.Startlocatie, plan.Taaknummers)}</td>`;
        } else {
          tbody += `<td${tdCls}><span class="cell-chip status-none">—</span></td>`;
        }
      });
      tbody += '</tr>';
    });
  };

  groupOrder.forEach(renderGroup);
  Object.keys(groups).forEach(g => {
    if (!groupOrder.includes(g)) renderGroup(g);
  });

  const html = `<table class="planning-table">
    <thead>${thead}</thead>
    <tbody>${tbody}</tbody>
  </table>`;

  document.getElementById('planningPanel').innerHTML = html;
  document.getElementById('planBadge').textContent = `${activeRes.length} personen`;
}

// ─────────────────────────────────────────────
// SHOW ERROR WITH COOKIE INPUT
// ─────────────────────────────────────────────
function showCookieInput() {
  const html = `
    <div class="error-msg">
      <div style="font-size:16px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;">⚠ Sessie verlopen of cookie ontbreekt</div>
      <div style="color:var(--muted);font-size:12px;">Plak hieronder je cookie string uit de browser DevTools</div>
      <div class="cookie-box">
        <label>Cookie string (kopieer uit F12 → Network → Headers → Cookie)</label>
        <textarea id="cookieInput" placeholder="_Secure-iamdt_client=...;JSESSIONID=..."></textarea>
        <button onclick="saveCookie()">Opslaan &amp; Laden</button>
      </div>
    </div>`;
  document.getElementById('resourcesPanel').innerHTML = html;
  document.getElementById('planningPanel').innerHTML = `<div class="loading" style="color:var(--muted);">Wacht op cookie...</div>`;
  document.getElementById('statusDot').style.background = 'var(--red)';
  document.getElementById('statusDot').style.boxShadow = '0 0 6px var(--red)';
}

window.saveCookie = function() {
  const val = document.getElementById('cookieInput').value.trim();
  if (val) {
    CONFIG.cookie = val;
    loadAll();
  }
};

// ─────────────────────────────────────────────
// LOAD ALL DATA
// ─────────────────────────────────────────────
async function loadAll() {
  document.getElementById('statusDot').style.background = 'var(--orange)';
  document.getElementById('statusDot').style.boxShadow = '0 0 6px var(--orange)';

  try {
    // Load resources
    const resources = await apiFetch('Resources_Report?criteria=(Tonen_in_Planning%3D%3D%22true%22)&from=1&limit=200');

    // Load plannings for all pages (200 per request)
    let allPlannings = [];
    for (let from = 1; from <= 5000; from += 200) {
      const chunk = await apiFetch(`All_Plannings?from=${from}&limit=200`);
      allPlannings = allPlannings.concat(chunk);
      if (chunk.length < 200) break;
    }

    // Filter to current week only
    const weekDates = new Set(days.map(fmtDate));
    const weekPlannings = allPlannings.filter(p => weekDates.has(p.Datum));

    renderResources(resources, weekPlannings);
    renderPlanning(resources, weekPlannings);

    document.getElementById('statusDot').style.background = 'var(--green)';
    document.getElementById('statusDot').style.boxShadow = '0 0 6px var(--green)';
  } catch (err) {
    console.error(err);
    showCookieInput();
  }
}

// ─────────────────────────────────────────────
// START + AUTO REFRESH
// ─────────────────────────────────────────────
loadAll();
setInterval(loadAll, CONFIG.refreshInterval);
</script>
